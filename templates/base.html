{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>{% block title %} Chat App {% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f0f2f5;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* LEFT PANEL */
        .sidebar {
            width: 30%;
            background: white;
            border-right: 1px solid #ddd;
            overflow-y: auto;
        }

        /* RIGHT PANEL */
        .chat {
            width: 70%;
            display: flex;
            flex-direction: column;
        }

        /* MESSAGES AREA */
        .messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        /* INPUT AREA */
        .input-box {
            display: flex;
            padding: 10px;
            background: white;
        }

        .input-box input {
            flex: 1;
            padding: 10px;
        }

        .input-box button {
            padding: 10px;
        }

        /* MESSAGE BUBBLES */
        .msg {
            padding: 8px 12px;
            margin: 5px;
            border-radius: 10px;
            max-width: 60%;
        }

        .me {
            background: #dcf8c6;
            margin-left: auto;
        }

        .other {
            background: white;
        }
    </style>
</head>

<body>

{% block content %}
{% endblock %}

<!-- 🔥 GLOBAL JS FILES (ADD HERE) -->
<script src="{% static 'js/auth.js' %}"></script>
<script src="{% static 'js/chat.js' %}"></script>

<!-- 🔥 PAGE-SPECIFIC JS (optional) -->
{% block scripts %}
{% endblock %}

</body>
</html>
