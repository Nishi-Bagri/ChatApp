{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* LEFT: conversations */
        .sidebar {
            width: 30%;
            border-right: 1px solid #ccc;
            overflow-y: auto;
        }

        .conversation {
            padding: 15px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        .conversation:hover {
            background: #f5f5f5;
        }

        /* RIGHT: messages */
        .chat-box {
            width: 70%;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .input-box {
            display: flex;
            border-top: 1px solid #ccc;
        }

        .input-box input {
            flex: 1;
            padding: 10px;
            border: none;
        }

        .input-box button {
            padding: 10px 20px;
            background: #075E54;
            color: white;
            border: none;
            cursor: pointer;
        }

        .msg {
            margin: 5px 0;
        }

        .me {
            text-align: right;
            color: green;
        }

        .other {
            text-align: left;
            color: black;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="sidebar" id="conversationList">
        <h3 style="padding:10px;">Chats</h3>
    </div>

    <!-- RIGHT SIDE -->
    <div class="chat-box">

        <div class="messages" id="messageBox">
            <p>Select a conversation</p>
        </div>

        <div class="input-box">
            <input type="text" id="messageInput" placeholder="Type a message..." />
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

</div>

<script src="{% static 'js/chat.js' %}"></script>

</body>
</html>
