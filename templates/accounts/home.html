{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
</head>
<body>

<h2>Welcome 👋</h2>

<script>
    const token = localStorage.getItem("token");

    if (token) {
        // user is logged in → go to chat
        window.location.href = "/chat/";
    } else {
        // not logged in → go to login
        window.location.href = "/login/";
    }
</script>

</body>
</html>
