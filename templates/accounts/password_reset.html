{% extends "base.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}

<div style="max-width:400px;margin:80px auto;background:white;padding:20px;border-radius:10px;">
    <h2>Reset Password</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="email" name="email" placeholder="Enter your email"
               style="width:100%;padding:10px;margin-bottom:10px;">

        <button style="width:100%;padding:10px;background:#075E54;color:white;border:none;">
            Send Reset Link
        </button>
    </form>
</div>

{% endblock %}
